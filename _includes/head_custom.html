<style>
/* ── jekyll-tabs: tab navigation ───────────────────────────────────────── */
ul.tab {
    display: flex;
    flex-wrap: wrap;
    margin: 1.5rem 0 0;
    padding: 0;
    list-style: none;
    border-bottom: 2px solid #eeebee;
    gap: 0;
}
ul.tab > li {
    flex: none;
    position: relative;
    margin-bottom: -2px;
}
ul.tab > li > a {
    display: block;
    padding: 8px 18px;
    color: #5c5962;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border: 2px solid transparent;
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    transition: color 0.1s ease, background 0.1s ease;
    white-space: nowrap;
}
ul.tab > li > a:hover {
    color: #7253ed;
    background: #f5f6fa;
    text-decoration: none;
}
ul.tab > li.active > a {
    color: #7253ed;
    border-color: #eeebee;
    border-bottom-color: #fff;
    background: #fff;
}

/* ── jekyll-tabs: tab content ──────────────────────────────────────────── */
ul.tab-content {
    padding: 0;
    margin: 0 0 1.5rem;
    list-style: none;
}
ul.tab-content > li {
    display: none;
    padding: 1.25rem 0.25rem 0.25rem;
}
ul.tab-content > li.active {
    display: block;
}
</style>

<script>
/* jekyll-tabs 1.2.1 – verbatim JS from gem docs/tabs.js */
const jekyllTabsConfiguration = {
    syncTabsWithSameLabels: false,
    activateTabFromUrl: false,
    addCopyToClipboardButton: false,
    copyToClipboardButtonHtml: '<button>Copy</button>',
};
const jekyllTabsModule = (function () {
    const removeActiveClasses = function (ulElement) {
        const liElements = ulElement.querySelectorAll('ul > li');
        Array.prototype.forEach.call(liElements, function (liElement) { liElement.classList.remove('active'); });
    };
    const getChildPosition = function (element) {
        const parent = element.parentNode;
        for (let i = 0; i < parent.children.length; i++) {
            if (parent.children[i] === element) return i;
        }
        throw new Error('No parent found');
    };
    const findElementsContaining = function (elementTag, text) {
        const elements = document.querySelectorAll(elementTag);
        const result = [];
        for (let i = 0; i < elements.length; i++) {
            if (elements[i].textContent.includes(text)) result.push(elements[i]);
        }
        return result;
    };
    const handleTabClicked = function (link) {
        const liTab = link.parentNode;
        const ulTab = liTab.parentNode;
        const liPositionInUl = getChildPosition(liTab);
        if (liTab.className.includes('active')) return;
        const tabContentId = ulTab.getAttribute('data-tab');
        const tabContentElement = document.getElementById(tabContentId);
        removeActiveClasses(ulTab);
        removeActiveClasses(tabContentElement);
        tabContentElement.querySelectorAll('ul.tab-content > li')[liPositionInUl].classList.add('active');
        liTab.classList.add('active');
    };
    const createElementFromHtml = function (html) {
        const template = document.createElement('template');
        template.innerHTML = html.trim();
        return template.content.firstChild;
    };
    const copyToClipboard = function (text) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text);
        } else {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'absolute';
            textArea.style.left = '-999999px';
            document.body.prepend(textArea);
            textArea.select();
            try { document.execCommand('copy'); } catch (e) { console.error(e); } finally { textArea.remove(); }
        }
    };
    const activateTabFromUrl = function () {
        const tabsAnchor = window.location.hash.substring(1);
        if (!tabsAnchor) return;
        const targetedTabs = document.getElementById(tabsAnchor);
        if (!targetedTabs) return;
        const urlParams = new URLSearchParams(window.location.search);
        const tabIdToActivate = urlParams.get('active_tab');
        if (!tabIdToActivate) return;
        const tabLink = targetedTabs.querySelector('li#' + tabIdToActivate + ' > a');
        if (tabLink) jekyllTabsModule.handleTabClicked(tabLink);
    };
    const updateUrlWithActiveTab = function (link) {
        const liTab = link.parentNode;
        const ulTab = liTab.parentNode;
        const searchParams = new URLSearchParams(window.location.search);
        searchParams.set('active_tab', liTab.id);
        history.replaceState(null, '', window.location.pathname + '?' + searchParams.toString() + '#' + ulTab.id);
    };
    return { findElementsContaining, handleTabClicked, createElementFromHtml, copyToClipboard, activateTabFromUrl, updateUrlWithActiveTab };
})();

window.addEventListener('load', function () {
    const tabLinks = document.querySelectorAll('ul.tab > li > a');
    Array.prototype.forEach.call(tabLinks, function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();
            jekyllTabsModule.handleTabClicked(link);
            if (jekyllTabsConfiguration.activateTabFromUrl) jekyllTabsModule.updateUrlWithActiveTab(link);
            if (jekyllTabsConfiguration.syncTabsWithSameLabels) {
                const linksWithSameName = jekyllTabsModule.findElementsContaining('a', link.textContent);
                for (let i = 0; i < linksWithSameName.length; i++) {
                    if (linksWithSameName[i] !== link) jekyllTabsModule.handleTabClicked(linksWithSameName[i]);
                }
            }
        }, false);
    });
    if (jekyllTabsConfiguration.addCopyToClipboardButton) {
        const preElements = document.querySelectorAll('ul.tab-content > li pre');
        for (let i = 0; i < preElements.length; i++) {
            const preElement = preElements[i];
            const button = jekyllTabsModule.createElementFromHtml(jekyllTabsConfiguration.copyToClipboardButtonHtml);
            preElement.parentNode.style.position = 'relative';
            button.style.position = 'absolute'; button.style.top = '0'; button.style.right = '0';
            preElement.parentNode.appendChild(button);
            button.addEventListener('click', function () { jekyllTabsModule.copyToClipboard(preElement.innerText); });
        }
    }
    if (jekyllTabsConfiguration.activateTabFromUrl) jekyllTabsModule.activateTabFromUrl();
});
</script>
